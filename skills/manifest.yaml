# Skills Manifest
# Canonical source for skill metadata. Markdown tables in _index.md are derived from this file.
# Schema: name, tier, path, description, dependencies, invocations, status

version: "3.0.0"   # bump on every release; read by analysis-manifest toolboxVersion check

skills:
  # ── Core Skills (Always Active) ──────────────────────────────────────
  - name: git-workflow
    tier: core
    path: core/git-workflow/
    description: Git best practices, branching strategies, commit hygiene
    dependencies: []
    invocations: []
    version: "1.0"
    status: complete

  - name: todo-workflow
    tier: core
    path: core/todo-workflow/
    description: Invokable autonomous/semi-autonomous development workflow
    dependencies: [git-workflow]
    invocations:
      - "Use todo workflow"
    version: "1.0"
    status: complete

  - name: bootstrap
    tier: core
    path: core/bootstrap/
    description: Session bootstrap — introduce toolkit, report project state, guide user to first action via direct skill use or metarepo setup
    dependencies: []
    invocations:
      - "/start"
      - "/help"
      - "/skills"
      - "/update"
      - "/upgrade"
      - "Bootstrap this repo"
      - "Get started"
      - "Introduce yourself"
      - "Check for updates"
      - "What needs updating?"
      - "Upgrade the toolkit"
      - "Update to latest version"
      - "What's new in the toolkit?"
    version: "1.0"
    status: complete

